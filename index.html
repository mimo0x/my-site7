  .avatar-ring{width:150px;height:150px;border-radius:50%;border:2px solid #7c3aed;box-shadow:0 0 38px rgba(124,58,237,.4),0 0 80px rgba(124,58,237,.12);overflow:hidden;background:#0f0a1e}
  .avatar-ring img{width:100%;height:100%;object-fit:cover}
  .name{font-size:2.4rem;font-weight:700;color:#f0eaff;letter-spacing:8px;text-transform:uppercase;margin-bottom:.4rem;animation:fadeDown .7s .1s ease both}
  .sub{font-size:.75rem;color:#6b6080;letter-spacing:4px;text-transform:uppercase;margin-bottom:2.4rem;animation:fadeDown .7s .15s ease both}
  .divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,#7c3aed,transparent);margin-bottom:2.4rem;animation:fadeIn .7s .2s ease both}
  .cards{display:flex;flex-direction:column;gap:13px;width:100%}
  .card{background:rgba(10,8,18,0.7);border:1px solid #1e1b2e;border-radius:13px;padding:1rem 1.3rem;display:flex;align-items:center;gap:15px;text-decoration:none;transition:border-color .22s,background .22s,transform .18s;backdrop-filter:blur(10px);animation:slideIn .55s ease both}
  .card:nth-child(1){animation-delay:.25s}.card:nth-child(2){animation-delay:.32s}.card:nth-child(3){animation-delay:.39s}.card:nth-child(4){animation-delay:.46s}.card:nth-child(5){animation-delay:.53s}
  .card:hover{border-color:#7c3aed;background:rgba(20,12,35,.75);transform:translateX(6px)}
  .icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .icon-twitch{background:#180828;border:1px solid #2d1b50}.icon-kick{background:#081508;border:1px solid #1a3a18}.icon-yt{background:#1a0808;border:1px solid #3a1a1a}.icon-discord{background:#080d1e;border:1px solid #181e40}.icon-ig{background:#1a080f;border:1px solid #38101e}
  .info{flex:1}
  .platform{font-size:.7rem;font-weight:700;color:#c4b5fd;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:2px}
  .label{font-size:.88rem;color:#42384f;letter-spacing:.5px}
  .arrow{font-size:1rem;color:#332840;transition:color .2s,transform .2s}
  .card:hover .arrow{color:#a78bfa;transform:translateX(5px)}
  .live{display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;margin-right:6px;vertical-align:middle;animation:pulse 1.6s infinite}
  .footer{margin-top:2.8rem;font-size:.6rem;color:#2a2535;letter-spacing:4px;text-transform:uppercase;animation:fadeIn 1s .7s ease both}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.65)}}
</style>
</head>
